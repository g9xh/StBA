<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STBA - عـجـلـة الـخـظ 🍀</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* الخلفية المطلوبة مع طبقة تغبيش سوداء */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://i.imgur.com/w6yd97h.png');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 15px #2ecc71;
            font-weight: bold;
        }

        /* حاوية العجلة */
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 40px;
        }

        /* السهم العلوي */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #e74c3c;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
            border-bottom: 2px solid white;
        }

        /* العجلة الملونة */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #f1c40f;
            position: relative;
            transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1);
            /* تلوين الأقسام بشكل دائري */
            background: conic-gradient(
                #e74c3c 0deg 45deg, 
                #3498db 45deg 90deg, 
                #2ecc71 90deg 135deg, 
                #f1c40f 135deg 180deg, 
                #9b59b6 180deg 225deg, 
                #e67e22 225deg 270deg, 
                #1abc9c 270deg 315deg, 
                #34495e 315deg 360deg
            );
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* إضافة نصوص الصيانة داخل العجلة */
        .wheel::before {
            content: "صيانة";
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 5px black;
            pointer-events: none;
        }

        /* نقطة المنتصف */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            z-index: 25;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            border: 4px solid #333;
        }

        button {
            padding: 18px 40px;
            font-size: 1.4rem;
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.6);
        }

        button:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }

        .maintenance-msg {
            margin-top: 25px;
            font-size: 1.2rem;
            color: #f39c12;
            display: none;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>STBA - عـجـلـة الـخـظ 🍀</h1>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="center-dot"></div>
            <div class="wheel" id="wheel"></div>
        </div>

        <button id="spinBtn">دور العجلة الان !</button>
        <p class="maintenance-msg" id="msg">⚠️ عذراً: جميع الأقسام في صيانة حالياً، حاول لاحقاً.</p>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const btn = document.getElementById('spinBtn');
        const msg = document.getElementById('msg');

        btn.addEventListener('click', () => {
            // تعطيل الزر
            btn.disabled = true;
            
            // دوران عشوائي طويل (5 لفات + زاوية عشوائية)
            const extraDegree = Math.floor(Math.random() * 360);
            const totalRotation = 1800 + extraDegree; 
            
            wheel.style.transform = `rotate(${totalRotation}deg)`;

            // النتيجة بعد توقف العجلة
            setTimeout(() => {
                msg.style.display = 'block';
                btn.style.opacity = '0.5';
                alert("STBA: عذراً، هذا القسم تحت الصيانة!");
            }, 5000);
        });
    </script>
</body>
</html>
