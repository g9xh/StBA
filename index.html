<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> STBA - عـجـلـة الـحـظ 🍀 </title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://i.imgur.com/w6yd97h.png');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 15px #2ecc71;
            font-weight: bold;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 40px;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #e74c3c;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
            border-bottom: 2px solid white;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #f1c40f;
            position: relative;
            transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1);
            background: conic-gradient(
                #e74c3c 0deg 45deg, 
                #3498db 45deg 90deg, 
                #2ecc71 90deg 135deg, 
                #f1c40f 135deg 180deg, 
                #9b59b6 180deg 225deg, 
                #e67e22 225deg 270deg, 
                #1abc9c 270deg 315deg, 
                #34495e 315deg 360deg
            );
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,0,0,0.5);
        }

        .wheel::before {
            content: "صيانة";
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 5px black;
            pointer-events: none;
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            z-index: 25;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            border: 4px solid #333;
        }

        .btns-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            width: 80%;
        }

        #spinBtn {
            background: linear-gradient(45deg, #e67e22, #f39c12);
            box-shadow: 0 5px 20px rgba(230, 126, 34, 0.4);
        }

        /* زر الشاشة الكاملة */
        #fullScreenBtn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            padding: 10px 20px;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .maintenance-msg {
            margin-top: 25px;
            font-size: 1.2rem;
            color: #f39c12;
            display: none;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1> STBA - عـجـلـة الـحـظ🍀 </h1>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="center-dot"></div>
            <div class="wheel" id="wheel"></div>
        </div>

        <div class="btns-group">
            <button id="spinBtn">دور العجلة الان !</button>
            <button id="fullScreenBtn">وضع الشاشة الكاملة (إخفاء الشريط)</button>
        </div>

        <p class="maintenance-msg" id="msg">⚠️ عذراً: جميع الأقسام في صيانة حالياً، حاول لاحقاً.</p>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const btn = document.getElementById('spinBtn');
        const fullBtn = document.getElementById('fullScreenBtn');
        const msg = document.getElementById('msg');

        // وظيفة تدوير العجلة
        btn.addEventListener('click', () => {
            btn.disabled = true;
            const extraDegree = Math.floor(Math.random() * 360);
            const totalRotation = 1800 + extraDegree; 
            wheel.style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                msg.style.display = 'block';
                alert("STBA: عذراً، هذا القسم تحت الصيانة!");
            }, 5000);
        });

        // وظيفة الشاشة الكاملة
        fullBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`خطأ: لا يمكن تفعيل الشاشة الكاملة (${err.message})`);
                });
                fullBtn.innerText = "خروج من الشاشة الكاملة";
            } else {
                document.exitFullscreen();
                fullBtn.innerText = "وضع الشاشة الكاملة (إخفاء الشريط)";
            }
        });
    </script>
</body>
</html>
